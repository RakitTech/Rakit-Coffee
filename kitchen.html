<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rakit Coffee - KDS</title>
  <link rel="stylesheet" href="./src/css/design-system.css?t=99991">
  <link rel="stylesheet" href="./src/css/kitchen.css?t=99996">
  <script type="module" src="./src/kitchen.js?t=99992"></script>
  <script>
    (function() {
      try {
        var cms = localStorage.getItem('rakit_cms');
        if (cms) {
          var settings = JSON.parse(cms);
          if (settings.themeColor) {
            document.documentElement.style.setProperty('--color-accent', settings.themeColor);
            document.documentElement.style.setProperty('--color-accent-light', settings.themeColor + '26');
            document.documentElement.style.setProperty('--color-accent-hover', settings.themeColor + '0D');
            document.documentElement.style.setProperty('--color-accent-05', settings.themeColor + '0D');
            document.documentElement.style.setProperty('--color-accent-10', settings.themeColor + '1A');
            document.documentElement.style.setProperty('--color-accent-15', settings.themeColor + '26');
            document.documentElement.style.setProperty('--color-accent-20', settings.themeColor + '33');
            document.documentElement.style.setProperty('--shadow-accent', '0 8px 30px ' + settings.themeColor + '4D');
            document.documentElement.style.setProperty('--kitchen-header-bg', settings.themeColor);
          }
          if (settings.fontFamily) {
             document.documentElement.style.setProperty('--font-heading', settings.fontFamily);
          }
        }
      } catch(e) {}
    })();
  </script>
</head>
<body class="kds-body">
  
  <header class="kds-header">
    <div class="kds-brand">
      <span class="material-symbols-outlined" style="font-size: 32px; color: var(--color-surface-lowest);">kitchen</span>
      <h1>Kitchen Display System</h1>
    </div>
    <div style="display: flex; gap: 16px; align-items: center;">
      <div class="kds-time" id="clock" style="color: var(--color-surface-lowest);">00:00:00</div>
      <button id="btn-logout" class="btn" style="background: rgba(255,255,255,0.2); color: white; border: none; display: flex; align-items: center; gap: 8px;">
        <span class="material-symbols-outlined" style="font-size: 18px;">logout</span> Keluar
      </button>
    </div>
  </header>

  <main class="kds-board">
    <!-- Kolom Diterima -->
    <div class="kds-column">
      <div class="kds-column-header">
        <h2>Diterima</h2>
        <span class="kds-badge" id="count-diterima">0</span>
      </div>
      <div class="kds-column-content" id="col-diterima">
        <!-- Order cards here -->
      </div>
    </div>

    <!-- Kolom Dimasak -->
    <div class="kds-column">
      <div class="kds-column-header" style="background-color: #3b82f6; color: white;">
        <h2>Sedang Dimasak</h2>
        <span class="kds-badge" id="count-dimasak" style="background-color: white; color: #3b82f6;">0</span>
      </div>
      <div class="kds-column-content" id="col-dimasak">
        <!-- Order cards here -->
      </div>
    </div>

    <!-- Kolom Siap -->
    <div class="kds-column">
      <div class="kds-column-header" style="background-color: var(--color-success); color: white;">
        <h2>Siap Diantar</h2>
        <span class="kds-badge" id="count-siap" style="background-color: white; color: var(--color-success);">0</span>
      </div>
      <div class="kds-column-content" id="col-siap">
        <!-- Order cards here -->
      </div>
    </div>
  </main>

</body>
</html>
