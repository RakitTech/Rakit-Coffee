<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Rakit Coffee</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-surface-container);
    }
    .login-container {
      background: var(--color-surface);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--color-primary);
      margin-bottom: 8px;
    }
    .login-header p {
      color: var(--color-text-muted);
      margin-bottom: 32px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--color-text);
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(105, 59, 34, 0.1);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      margin-top: 12px;
    }
    .error-msg {
      color: var(--color-error, #dc3545);
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/login-D-odinks.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/store-DBFN5oMG.js">
  <link rel="stylesheet" crossorigin href="/assets/design-system-CA871Xq-.css">
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>Rakit Coffee</h1>
      <p>Masuk ke panel manajemen</p>
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="admin" autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="admin123" autocomplete="current-password">
      </div>
      
      <button type="submit" class="btn btn-primary btn-login" id="btn-submit">
        Masuk
      </button>
      
      <div id="error-msg" class="error-msg">Username atau password salah.</div>
    </form>
  </div>

</body>
</html>
